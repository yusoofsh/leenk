name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Nub and Node.js
        uses: nubjs/setup-nub@v0.4.0
        with:
          node-version: 24
          nub-version: 0.2.10

      - name: Install dependencies
        run: nub install --frozen-lockfile

      - name: Verify project
        run: nub run verify

      - name: Audit dependencies
        run: nub audit --audit-level=high
